<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FJOREN</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── NAV ── -->
<nav>
  <a href="index.html" class="nav-logo">FJOREN</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Início</a></li>
    <li><a href="#colecao">Coleção</a></li>
    <li><a href="provador.html">Provador</a></li>
    <li><a href="#contato">Contato</a></li>
  </ul>
  <div class="nav-icons">
    <a href="#" title="Conta" onclick="abrirModalAuth(); return false;" class="perfil-link">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
      </svg>
    </a>
    <a href="#" title="Sacola" onclick="toggleSacola(); return false;" style="position:relative">
      <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 0 1-8 0"/>
      </svg>
      <span class="sacola-badge">0</span>
    </a>
  </div>
</nav>
<!-- ── CAPA  ── -->

<section class="top-capa"></section>

<!-- ── GALERIA ── -->
<section class="fj-galeria-section">
  <div class="fj-page-wrapper">
    <div class="fj-gallery-container" id="fj-gallery"></div>
  </div>
</section>

<!-- ── HERO ── -->
<section class="hero">
  <div class="sidebar">NEW ERA OF FASHION</div>
  <div class="container content text-light">
    <h1 class="title">T-SHIRT</h1>
    <h4 class="subtitle">Basic Pack</h4>
    <h2 class="price">R$159,99</h2>
    <p class="desc">Pack de camisetas básicas com design minimalista e versátil.</p>
    <button onclick="document.getElementById('categorias').scrollIntoView({behavior:'smooth'})" class="btn-custom mt-4">
      VER COLEÇÃO
    </button>
  </div>
</section>

<!-- ── CATEGORIAS ── -->
<section id="categorias" class="categorias">
  <h2 class="titulo-colecao">CATEGORIAS</h2>
  <div class="carousel-container">
    <button class="nav-btn" onclick="voltar()">❮</button>
    <div class="cards" id="cards"></div>
    <button class="nav-btn" onclick="avancar()">❯</button>
  </div>
</section>

<!-- ── COLEÇÃO ── -->
<section id="colecao" class="colecao">
  <div class="container">
    <h2 class="titulo-colecao" style="color:#fff; margin-bottom:40px">COLEÇÃO</h2>
    <div class="row g-4" id="colecao-grid"></div>
  </div>
</section>

<!-- ── SACOLA ── -->
<div id="sacola" class="sacola">
  <h3>
    Sacola
    <button class="sacola-fechar" onclick="toggleSacola()">×</button>
  </h3>
  <div id="itens-sacola"></div>
  <div class="sacola-footer">
    <div class="sacola-total-row">
      <span class="sacola-total-label">Total</span>
      <span id="sacola-total">R$0,00</span>
    </div>
    <button class="comprar">Finalizar Compra</button>
  </div>
</div>

<!-- ── MODAL AUTH ── -->
<div id="modal-auth" class="modal-overlay">
  <div class="modal-box">
    <button class="modal-fechar" onclick="fecharModalAuth()">×</button>
    <span class="modal-logo">FJOREN</span>

    <div class="auth-abas">
      <button class="auth-aba ativa" data-aba="login" onclick="trocarAba('login')">Entrar</button>
      <button class="auth-aba" data-aba="cadastro" onclick="trocarAba('cadastro')">Cadastrar</button>
    </div>

    <!-- LOGIN -->
    <form id="form-login" class="auth-form ativo" onsubmit="fazerLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input id="log-email" type="email" placeholder="seu@email.com" required>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input id="log-senha" type="password" placeholder="••••••" required>
      </div>
      <button class="btn-auth" type="submit">Entrar</button>
    </form>

    <!-- CADASTRO -->
    <form id="form-cadastro" class="auth-form" onsubmit="cadastrar(event)">
      <div class="form-group">
        <label>Nome completo *</label>
        <input id="cad-nome" type="text" placeholder="Seu nome" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input id="cad-email" type="email" placeholder="email@email.com" required>
        </div>
        <div class="form-group">
          <label>Senha *</label>
          <input id="cad-senha" type="password" placeholder="••••••" required>
        </div>
      </div>
      <div class="form-group">
        <label>CEP *</label>
        <input id="cad-cep" type="text" placeholder="00000-000" maxlength="9" required
               oninput="this.value=this.value.replace(/\D/g,'').replace(/^(\d{5})(\d)/,'$1-$2')"
               onblur="buscarCEP(this.value)">
      </div>
      <div class="form-group">
        <label>Rua</label>
        <input id="cad-rua" type="text" placeholder="Preenchido automaticamente">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Bairro</label>
          <input id="cad-bairro" type="text">
        </div>
        <div class="form-group">
          <label>Cidade</label>
          <input id="cad-cidade" type="text">
        </div>
      </div>
      <div class="form-group">
        <label>Estado</label>
        <input id="cad-estado" type="text" maxlength="2">
      </div>
      <button class="btn-auth" type="submit">Criar conta</button>
    </form>
  </div>
</div>

<script src="data.js"></script>
<script src="sacola.js"></script>
<script src="script.js"></script>
<script src="galeria.js"></script>
</body>
</html>
